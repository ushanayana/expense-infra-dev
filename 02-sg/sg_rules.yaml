- name: SG Rules 
  sg:
  - expense-dev-db 
  - expense-dev-backend 
  - expense-dev-frontend
  - expense-dev-bastion
  - expense-dev-app-alb #backend alb
  - expense-dev-vpn
  expense-dev-vpn:
  - name: vpn_public 
    desc: vpn accepting connetions from public 
    source: public 
    port: 943,443,22,1194

  db:
  - name: db_backend 
    desc: db accepting connetions from backend
    source: backend 
    port: 3306 
  - name: db_vpn 
    desc: db accepting connetions from vpn
    source: vpn
    port: 3306   
  - name: db_bastion 
    desc: db accepting connections from bastion 
    source: bastion 
    port: 3306 
  app_alb:
  - name: app_alb_vpn 
    desc: app_alb accepting connections from vpn  
    source: vpn
    port: 80
  - name: app_alb_bastion
    desc: app_alb accepting connections from bastion 
    source: bastion 
    port: 80 
  - name: app_alb_frontend 
    desc: app_alb accepting connections from frontend 
    source: frontend 
    port: 80 
          

  backend: 
  - name: backend_app_alb 
    desc: backend accepting connections from app alb 
    source: app alb 
    port: 8080 
  - name: backend_bastion
    desc: backend accepting connections from bastion 
    source: bastion 
    port: 22
  - name: backend_vpn_ssh 
    desc: backend accepting connections from vpn 
    source: vpn 
    port: 22
  - name: backend_vpn_http 
    desc: backend accepting connections from vpn
    source: vpn 
    port: 8080
 
 
  frontend: 
  - name: frontend_public
    desc: frontend accepting connections from public 
    source: public 
    port: 80 
  - name: frontend_bastion 
    desc: frontend accepting connections from bation 
    source: bastion 
    port: 22
  - name: frontend_web_alb 
    desc: frontend accepting connections from web_alb 
    source: web_alb 
    port: 22 


  web_alb:
  - name: web_alb_public
    desc: web alb accepting connections from public
    source: public
    port: 80
  - name: web_alb_public_https
    desc: web alb accepting connections from public
    source: public
    port: 443


  vpn:
  - name: vpn_public 
    desc: vpn accepting connections from public 
    source: public 
    port: 443,22,1194,943 
   
  
  bastion:
  - name: bation_public 
    desc: bastion accepting connections from public 
    source: public 
    port: 22 #ideally your home ip address 22
            
